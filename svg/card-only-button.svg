<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 380 391"
     width="380"
     height="391"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Get In Touch card button</title>
  <desc id="desc">Transparent-background SVG conversion of the default card-only button state.</desc>

  <defs>
    <linearGradient id="cardGradient" x1="77" y1="0" x2="303" y2="391" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
  </defs>

  <style>
    .heading {
      fill: #64ffda;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 19.2px;
      font-weight: 400;
    }

    .button-label {
      fill: #64ffda;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
  </style>

  <rect x="0" y="0" width="380" height="391" rx="22" ry="22" fill="url(#cardGradient)"/>
  <rect x="2" y="2" width="376" height="387" rx="20" ry="20" fill="#171717"/>

  <text class="heading"
        x="190"
        y="50"
        text-anchor="middle"
        dominant-baseline="middle">Get In Touch</text>

  <rect x="32"
        y="285"
        width="316"
        height="51"
        rx="10"
        ry="10"
        fill="none"
        stroke="#64ffda"
        stroke-width="1"/>

  <text class="button-label"
        x="190"
        y="310.5"
        text-anchor="middle"
        dominant-baseline="middle">Send Message</text>
</svg>
