<div class="loader" style="--percent: 50;">
  <span class="value">50<span class="percent">%</span></span>
  <span class="spinner-dot"></span>
</div>

<div class="controls">
  <input type="range" id="percentRange" min="0" max="100" value="50">
</div>

<script>
  const range = document.getElementById('percentRange');
  const loader = document.querySelector('.loader');
  const valueText = document.querySelector('.loader .value');

  range.addEventListener('input', (e) => {
    const val = e.target.value;
    loader.style.setProperty('--percent', val);
    valueText.innerHTML = `${val}<span class="percent">%</span>`;
  });
</script>

<style>

  body {
    background: #000;
    margin: 0;
    overflow: hidden;
  }

  .controls {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input[type="range"] {
    writing-mode: bt-lr; /* Vertical slider for some browsers */
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 200px;
    background: #111;
    outline: none;
    border-radius: 4px;
  }
  
  .loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    background: transparent;
    border: 3px solid rgba(0, 102, 255, 0.1);
    border-radius: 50%;
    text-align: center;
    line-height: 150px;
    font-family: sans-serif;
    font-size: 60px;
    color: #0066ff;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 10px #0066ff;
    box-shadow: 0 0 20px rgba(0, 0, 0, .15);
  }

  
  .loader::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Use conic-gradient to create the gauge fill effect */
    /* Starting at 180deg (6 o'clock) */
    background: conic-gradient(
      from 180deg,
      #0066ff 0%,
      #0066ff calc(var(--percent) * 1%),
      transparent calc(var(--percent) * 1%),
      transparent 100%
    );
    border-radius: 50%;
    /* Mask the center to create a ring */
    -webkit-mask: radial-gradient(transparent 68px, #000 70px);
    mask: radial-gradient(transparent 68px, #000 70px);
  }
  
  .loader .value {
    line-height: 150px;
  }

  .loader .percent {
    font-size: 28px;
    line-height: 1;
  }

  .loader .spinner-dot {
    display: block;
    position: absolute;
    top: calc(50% - 2px);
    left: 50%;
    width: 50%;
    height: 4px;
    background: transparent;
    transform-origin: left;
    /* Start at 90deg (pointing right) and rotate to match the percent starting from 6 o'clock (90deg) */
    transform: rotate(calc(90deg + (var(--percent) * 3.6deg)));
    transition: transform 0.3s ease-out;
  }
  
  .loader .spinner-dot::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #00aeff;
    top: -6px;
    right: -8px;
    box-shadow: 0 0 20px 5px #0066ff;
  }
  
</style>
